<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>savant preloader</title>
<style>
  :root{
    --bg0:#010103;
    --bg1:#04060b;
    --bg2:#0a1020;
    --bg3:#16070d;
    --cyan:#43ddff;
    --mag:#ff32c1;
    --gold:#ffb400;
    --goldHot:#fff3c4;
    --goldDeep:#ff8400;
    --obs0:#020202;
    --obs1:#08090b;
    --obs2:#12151a;
    --obs3:#20252e;
    --obs4:#3a4351;
    --steel:#dce6f2;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    color:#fff;
    background:
      radial-gradient(circle at 50% 52%, rgba(255,180,0,.10), transparent 10%),
      radial-gradient(circle at 50% 48%, rgba(255,40,120,.12), transparent 18%),
      radial-gradient(circle at 50% 51%, rgba(67,221,255,.09), transparent 16%),
      radial-gradient(circle at 50% 40%, var(--bg2) 0%, var(--bg1) 38%, var(--bg0) 86%);
  }

  .scene,
  .grid,
  .streaks,
  .particles,
  .vignette{
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  .grid{
    opacity:.16;
    background:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:25vw 25vh, 25vw 25vh;
    mask:radial-gradient(circle at 50% 50%, rgba(0,0,0,.25) 0 10%, rgba(0,0,0,.9) 45%, transparent 90%);
  }

  .streaks{
    background:
      repeating-linear-gradient(102deg,
        transparent 0 82px,
        rgba(255,40,120,.14) 82px 84px,
        transparent 84px 170px,
        rgba(67,221,255,.16) 170px 172px,
        transparent 172px 260px,
        rgba(255,255,255,.06) 260px 261px,
        transparent 261px 360px);
    opacity:.46;
    transform:perspective(1000px) rotateX(78deg) scale(1.65) translateY(-12%);
    transform-origin:center;
    mask:radial-gradient(circle at 50% 56%, transparent 0 13%, #000 42%, transparent 88%);
  }

  .particles{
    overflow:hidden;
  }
  .particles::before,
  .particles::after{
    content:"";
    position:absolute;
    inset:-20%;
    background:
      radial-gradient(circle at 12% 34%, rgba(255,205,120,.95) 0 2px, transparent 3px),
      radial-gradient(circle at 68% 21%, rgba(255,255,255,.65) 0 2px, transparent 3px),
      radial-gradient(circle at 74% 66%, rgba(255,185,20,.8) 0 2px, transparent 3px),
      radial-gradient(circle at 43% 72%, rgba(255,215,150,.7) 0 1.6px, transparent 3px),
      radial-gradient(circle at 22% 61%, rgba(255,255,255,.45) 0 1.5px, transparent 3px),
      radial-gradient(circle at 53% 44%, rgba(255,175,0,.55) 0 1.5px, transparent 3px);
    background-size: 360px 360px, 420px 420px, 500px 500px, 440px 440px, 380px 380px, 520px 520px;
    opacity:.45;
    filter:blur(.2px);
    animation:drift 14s linear infinite;
  }
  .particles::after{
    transform:scale(1.15);
    opacity:.22;
    filter:blur(1.2px);
    animation-duration:22s;
  }

  .vignette{
    background:radial-gradient(circle at 50% 50%, transparent 0 42%, rgba(0,0,0,.22) 68%, rgba(0,0,0,.78) 100%);
  }

  .wrap{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:grid;
    place-items:center;
  }

  .stack{
    width:min(88vw, 640px);
    display:grid;
    place-items:center;
    gap:2.4rem;
    transform:translateY(-2vh);
  }

  .preloader{
    position:relative;
    width:min(74vw, 440px);
    aspect-ratio:1/1;
    display:grid;
    place-items:center;
  }

  .ring-shell{
    position:absolute;
    inset:0;
    overflow:visible;
    filter:
      drop-shadow(0 0 18px rgba(255,185,20,.10))
      drop-shadow(0 0 40px rgba(255,185,20,.06))
      drop-shadow(0 0 20px rgba(67,221,255,.04));
  }

  .logo-shell{
    position:relative;
    width:46%;
    aspect-ratio:1/1;
    display:grid;
    place-items:center;
    transform-origin:50% 50%;
    animation:logoSpinZ 12s linear infinite;
    filter:
      drop-shadow(0 14px 24px rgba(0,0,0,.5))
      drop-shadow(0 0 24px rgba(255,180,0,.09));
  }

  .logo-shell svg{
    width:100%;
    height:auto;
    overflow:visible;
    display:block;
  }

  .btn{
    min-width:min(78vw, 540px);
    padding:1.15rem 2rem;
    text-align:center;
    letter-spacing:.7em;
    text-transform:uppercase;
    color:rgba(255,255,255,.96);
    font-size:clamp(14px,2.4vw,20px);
    background:linear-gradient(180deg, rgba(8,10,16,.38), rgba(5,6,12,.74));
    border:1px solid rgba(255,255,255,.12);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.025),
      0 0 0 1px rgba(0,0,0,.35);
    backdrop-filter:blur(6px);
    animation:buttonPulse 1.4s ease-in-out infinite alternate;
  }

  .pct{
    position:absolute;
    top:calc(100% + 12px);
    font-size:12px;
    letter-spacing:.32em;
    color:rgba(255,255,255,.42);
    text-transform:uppercase;
  }

  .wordmark{
    position:absolute;
    bottom:-58px;
    left:50%;
    transform:translateX(-50%);
    font-size:18px;
    letter-spacing:.44em;
    text-transform:lowercase;
    color:rgba(255,255,255,.88);
    opacity:.0;
  }

  @keyframes logoSpinZ{
    from{transform:rotateZ(0deg)}
    to{transform:rotateZ(360deg)}
  }

  @keyframes hotTravel{
    from{stroke-dashoffset:220}
    to{stroke-dashoffset:0}
  }

  @keyframes pulseGold{
    0%,100%{opacity:.72}
    50%{opacity:1}
  }

  @keyframes drift{
    from{transform:translateY(0)}
    to{transform:translateY(-30px)}
  }

  @keyframes buttonPulse{
    from{opacity:.76}
    to{opacity:1}
  }

  @media (max-width:700px){
    .preloader{ width:min(76vw, 390px); }
    .logo-shell{ width:44%; }
  }
</style>
</head>

<script>
(function(){
  const pctEl = document.getElementById('pct');
  const track = document.getElementById('progressTrack');
  const flare = document.getElementById('ringFlare');
  const facetGroup = document.getElementById('facetGroup');
  const hotA = document.getElementById('hotA');
  const hotB = document.getElementById('hotB');
  const goldA = document.getElementById('goldA');
  const goldB = document.getElementById('goldB');

  // denser chipped-obsidian facets for more photorealistic faceting
  const ns = 'http://www.w3.org/2000/svg';
  function rand(a,b){ return a + Math.random()*(b-a); }
  const fills = ['#030303','#070708','#0d0f12','#12161b','#191d23','#232832','#2b3340','#111318'];
  const edges = ['#353c48','#262c35','#495263','#1c2027'];
  for(let i=0;i<420;i++){
    const x = rand(8,56);
    const y = rand(10,76);
    const s = rand(1.8,5.8);
    const tilt = rand(-1.5,1.5);
    const p = document.createElementNS(ns,'polygon');
    const pts = [
      [x, y],
      [x + s, y + tilt],
      [x + rand(-.8,1.1), y + s],
      [x - rand(.4,1.4), y + rand(.9,s*.9)]
    ].map(v=>v.join(',')).join(' ');
    p.setAttribute('points', pts);
    p.setAttribute('fill', fills[(Math.random()*fills.length)|0]);
    p.setAttribute('opacity', rand(.28,.96));
    facetGroup.appendChild(p);

    if(Math.random() > 0.36){
      const line = document.createElementNS(ns,'polyline');
      line.setAttribute('points', pts);
      line.setAttribute('fill', 'none');
      line.setAttribute('stroke', edges[(Math.random()*edges.length)|0]);
      line.setAttribute('stroke-width', rand(.08,.22));
      line.setAttribute('opacity', rand(.25,.78));
      facetGroup.appendChild(line);
    }
  }

  // static base neon, animated hot streak
  const circumference = 911;
  let p = 0;
  function tick(){
    p += 0.0044;
    if(p > 1) p = 1;

    pctEl.textContent = String(Math.floor(p*100)).padStart(3,'0');
    track.setAttribute('stroke-dashoffset', String(circumference * (1 - p)));

    const a = (-90 + p * 360) * Math.PI / 180;
    const r = 145;
    const x = 250 + Math.cos(a) * r;
    const y = 250 + Math.sin(a) * r;
    flare.setAttribute('transform', 'translate(' + x + ' ' + y + ') rotate(' + (-90 + p*360) + ')');

    requestAnimationFrame(tick);
  }
  tick();

  function setupHot(path){
    const len = path.getTotalLength();
    path.style.strokeDasharray = '11 ' + (len - 11);
    path.style.strokeDashoffset = String(len);
    path.style.animation = 'hotTravel 1.6s linear infinite, pulseGold 1.0s ease-in-out infinite';
  }
  setupHot(hotA);
  setupHot(hotB);

  goldA.style.animation = 'pulseGold 1.8s ease-in-out infinite';
  goldB.style.animation = 'pulseGold 1.8s ease-in-out infinite';
})();
</script>
</body>
</html>
